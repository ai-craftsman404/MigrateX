name: MigrateX CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Syntax check
        run: python -m compileall migratex

      - name: Run tests
        # Avoid repo-default addopts that force xdist + strict coverage thresholds.
        run: python -m pytest -q -n 0 -o addopts='' --ignore=tests/performance
